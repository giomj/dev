name: Grand Council — Attribution Check

on:
  push:
    paths:
      - 'references/**'
  pull_request:
    paths:
      - 'references/**'

jobs:
  attribution:
    name: License-gradient and attribution gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Grand Council attribution check
        working-directory: references
        run: python scripts/check_attribution.py

      - name: Install schema validation dependencies
        run: pip install jsonschema

      - name: Run Wave 2 schema validation
        working-directory: references
        run: python scripts/validate_schemas.py
